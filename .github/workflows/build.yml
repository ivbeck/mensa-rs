name: Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mensa
            gui_artifact: mensa-gui
          - os: windows-latest
            artifact: mensa.exe
            gui_artifact: mensa-gui.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Build GUI (release)
        run: cargo build --release --features gui --bin mensa-gui

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mensa-${{ runner.os }}
          path: target/release/${{ matrix.artifact }}

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mensa-gui-${{ runner.os }}
          path: target/release/${{ matrix.gui_artifact }}
